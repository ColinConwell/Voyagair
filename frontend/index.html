<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voyagair</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-inner">
          <div class="header-left">
            <h1 class="logo">Voyagair</h1>
            <p class="tagline">Path-of-least-resistance travel planner</p>
          </div>
          <div class="header-controls">
            <button class="btn-icon" id="btn-layout-toggle" title="Toggle layout">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="14" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="btn-icon" id="btn-debug-toggle" title="Debug panel">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3 3l1.5 1.5M11.5 11.5L13 13M13 3l-1.5 1.5M4.5 11.5L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button class="btn-icon" id="btn-theme-toggle" title="Toggle theme">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
      </header>

      <div class="app-body">
        <main class="main">

          <!-- Landing View -->
          <section data-view="landing" class="landing-view">
            <div class="landing-hero">
              <h2>Plan Your Voyage</h2>
              <p class="landing-subtitle">Configure a multi-point trip or run a quick flight search.</p>
              <div class="landing-actions">
                <button class="btn btn-primary btn-lg" id="btn-new-voyage">New Voyage</button>
                <button class="btn btn-secondary btn-lg" id="btn-load-voyage">Load Voyage</button>
                <button class="btn btn-ghost btn-lg" id="btn-quick-search">Quick Search</button>
              </div>
              <div id="saved-voyages-list" class="saved-voyages-list" style="display:none"></div>
            </div>
          </section>

          <!-- Voyage View -->
          <section data-view="voyage" style="display:none" class="voyage-view">
            <div class="view-toolbar">
              <button class="btn btn-ghost btn-back-landing">Back</button>
            </div>
            <div class="voyage-layout" id="voyage-layout">
              <div class="voyage-left">
                <div id="voyage-config-container"></div>
                <div id="voyage-results-container" class="voyage-results-wrap"></div>
              </div>
              <div class="voyage-map-column">
                <section class="map-panel">
                  <h2>Route Map</h2>
                  <div id="map" class="map"></div>
                </section>
              </div>
            </div>
          </section>

          <!-- Quick Search View -->
          <section data-view="search" style="display:none" class="search-view">
            <div class="view-toolbar">
              <button class="btn btn-ghost btn-back-landing">Back</button>
            </div>

            <section class="search-panel">
              <form id="search-form" class="search-form">
                <div class="form-row">
                  <div class="form-group">
                    <label for="origins">From</label>
                    <input type="text" id="origins" placeholder="CPT, JNB" required />
                  </div>
                  <div class="form-group">
                    <label for="destinations">To</label>
                    <input type="text" id="destinations" placeholder="JFK, EWR" required />
                  </div>
                  <div class="form-group">
                    <label for="dates">Date</label>
                    <input type="date" id="dates" required />
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group form-group-sm">
                    <label for="adults">Passengers</label>
                    <input type="number" id="adults" value="1" min="1" max="9" />
                  </div>
                  <div class="form-group form-group-sm">
                    <label for="cabin">Cabin</label>
                    <select id="cabin">
                      <option value="economy">Economy</option>
                      <option value="premium_economy">Premium Economy</option>
                      <option value="business">Business</option>
                      <option value="first">First</option>
                    </select>
                  </div>
                  <div class="form-group form-group-sm">
                    <label for="max-stops">Max Stops</label>
                    <select id="max-stops">
                      <option value="">Any</option>
                      <option value="0">Nonstop</option>
                      <option value="1">1 stop</option>
                      <option value="2">2 stops</option>
                    </select>
                  </div>
                  <div class="form-group form-group-sm">
                    <label for="sort">Sort By</label>
                    <select id="sort">
                      <option value="price">Price</option>
                      <option value="duration">Duration</option>
                      <option value="stops">Stops</option>
                    </select>
                  </div>
                  <div class="form-group form-group-sm">
                    <label for="max-price">Max Price</label>
                    <input type="number" id="max-price" placeholder="No limit" />
                  </div>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn-primary" id="search-btn">Search Flights</button>
                  <label class="stream-toggle">
                    <input type="checkbox" id="stream-mode" checked />
                    <span>Stream results</span>
                  </label>
                </div>
              </form>
            </section>

            <section class="results-panel">
              <div class="results-header">
                <h2 id="results-title">Results</h2>
                <span id="results-count" class="results-count"></span>
              </div>
              <div id="results-status" class="results-status"></div>
              <div class="results-table-container">
                <table class="results-table">
                  <thead>
                    <tr>
                      <th>Route</th>
                      <th>Date</th>
                      <th>Carrier</th>
                      <th>Stops</th>
                      <th>Duration</th>
                      <th>Price</th>
                      <th>Source</th>
                    </tr>
                  </thead>
                  <tbody id="results-body"></tbody>
                </table>
              </div>
            </section>

            <section class="map-panel">
              <h2>Route Map</h2>
              <div id="map-search" class="map"></div>
            </section>
          </section>

        </main>

        <!-- Summary Side Panel -->
        <aside id="summary-container" class="summary-container"></aside>

        <!-- Debug Panel -->
        <aside id="debug-panel" class="debug-panel"></aside>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
